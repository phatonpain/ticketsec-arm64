name: quality-gates
on: [push, pull_request]
jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci

      - name: Install axe-core CLI if Chrome is available
        run: |
          if command -v google-chrome >/dev/null 2>&1; then
            npm install -g @axe-core/cli
          fi

      - name: Run all quality gates (local script mirror)
        run: |
          nohup npm run dev -- --port 5173 >/tmp/vite.log 2>&1 &
          sleep 5
          if command -v google-chrome >/dev/null 2>&1; then
            export CHROME_BIN=/usr/bin/google-chrome
            export CHROMEDRIVER_PATH=$(command -v chromedriver || echo "")
          fi
          bash scripts/gates.sh
          RC=$?
          pkill -f "vite --port 5173" || true
          exit $RC

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-evidence
          path: |
            TEST_RESULTS_v4.md
            /tmp/vite.log
